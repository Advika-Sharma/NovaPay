version: 2

models:
  - name: stg_vendor__credit_scores
    columns:
      - name: credit_score_sk
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - relationships:
              to: ref('stg_crm__customers')
              field: customer_id

  - name: stg_vendor__product_catalog
    columns:
      - name: product_id
        tests:
          - unique
          - not_null